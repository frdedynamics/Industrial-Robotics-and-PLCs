  resources:
    - assets/**

website:
  title: "Industrial Robotics and PLCs"
  favicon: favicon.ico

  repo-url: https://github.com/frdedynamics/Industrial-Robotics-and-PLCs
  repo-branch: master
  repo-actions: [edit, issue]

  sidebar:
    style: floating
    search: true
    contents: 
      - text: "Home"
        href: index.qmd

      - section: Robot Foundations
        contents: 
          - content/robots.qmd
          
      - section: content/simulation.qmd
        contents: 
          - content/simulation.qmd
      

format:
  html:
    theme:
      - cosmo
      - brand
    css: styles.css
    toc: true
    embed-resources: false



execute:
  freeze: false
  cache: false
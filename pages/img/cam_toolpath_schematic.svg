<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">CAM toolpath schematic</title>
  <desc id="desc">A schematic CAM workflow showing a CAD part, generated toolpath, postprocessor, and robot program.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1d4f8e" />
    </marker>
    <marker id="arrow-teal" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0f766e" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#1f2d3d" flood-opacity="0.13" />
    </filter>
  </defs>
  <rect width="1200" height="720" rx="26" fill="#f6f8fb" />
  <g filter="url(#shadow)">
    <rect x="72" y="82" width="306" height="506" rx="18" fill="#ffffff" stroke="#d9e2ec" />
    <rect x="447" y="82" width="306" height="506" rx="18" fill="#ffffff" stroke="#d9e2ec" />
    <rect x="822" y="82" width="306" height="506" rx="18" fill="#ffffff" stroke="#d9e2ec" />
  </g>
  <text x="225" y="135" text-anchor="middle" fill="#111827" font-family="Arial, sans-serif" font-size="32" font-weight="800">CAD model</text>
  <text x="600" y="135" text-anchor="middle" fill="#111827" font-family="Arial, sans-serif" font-size="32" font-weight="800">CAM toolpath</text>
  <text x="975" y="135" text-anchor="middle" fill="#111827" font-family="Arial, sans-serif" font-size="32" font-weight="800">Robot program</text>

  <path d="M389 338 C412 338 423 338 440 338" fill="none" stroke="#1d4f8e" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow-blue)" />
  <path d="M764 338 C787 338 798 338 815 338" fill="none" stroke="#1d4f8e" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow-blue)" />
  <text x="414" y="304" text-anchor="middle" fill="#1d4f8e" font-family="Arial, sans-serif" font-size="19" font-weight="800">features</text>
  <text x="789" y="304" text-anchor="middle" fill="#1d4f8e" font-family="Arial, sans-serif" font-size="19" font-weight="800">postprocessor</text>

  <g transform="translate(148 206)">
    <path d="M18 206 L18 78 L84 38 L222 38 L270 88 L270 206 Z" fill="#e8eef5" stroke="#9aa7b5" stroke-width="4" />
    <path d="M18 78 L84 118 L270 118 L270 88 L222 38 L84 38 Z" fill="#f4f7fb" stroke="#c8d3df" stroke-width="3" />
    <path d="M84 118 L84 38" stroke="#c8d3df" stroke-width="3" />
    <circle cx="78" cy="166" r="26" fill="#ffffff" stroke="#9aa7b5" stroke-width="4" />
    <circle cx="210" cy="166" r="26" fill="#ffffff" stroke="#9aa7b5" stroke-width="4" />
    <rect x="113" y="145" width="64" height="42" rx="8" fill="#ffffff" stroke="#9aa7b5" stroke-width="4" />
  </g>
  <text x="225" y="536" text-anchor="middle" fill="#566578" font-family="Arial, sans-serif" font-size="22" font-weight="700">part geometry</text>

  <g transform="translate(501 204)">
    <path d="M24 220 L24 92 L90 52 L232 52 L280 102 L280 220 Z" fill="#edf2f7" stroke="#9aa7b5" stroke-width="4" />
    <path d="M24 92 L90 132 L280 132 L280 102 L232 52 L90 52 Z" fill="#f8fafc" stroke="#c8d3df" stroke-width="3" />
    <path d="M90 132 L90 52" stroke="#c8d3df" stroke-width="3" />
    <path d="M-5 185 C42 144 72 148 112 178 C156 210 183 196 214 158 C237 130 262 119 306 125" fill="none" stroke="#1d4f8e" stroke-width="6" stroke-linecap="round" />
    <path d="M-4 137 C41 101 78 103 112 135 C156 176 182 150 214 118 C240 91 264 84 307 90" fill="none" stroke="#1d4f8e" stroke-width="4" stroke-linecap="round" opacity="0.75" />
    <path d="M22 102 L75 70 M88 66 L145 96 M159 100 L219 78 M233 76 L283 108" fill="none" stroke="#c2410c" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 7" />
    <g transform="translate(196 62)">
      <path d="M0 0 L46 0 L31 92 L15 92 Z" fill="#2a9d8f" stroke="#0f766e" stroke-width="4" />
      <circle cx="23" cy="112" r="11" fill="#ff7f50" stroke="#7c2d12" stroke-width="4" />
    </g>
  </g>
  <text x="600" y="536" text-anchor="middle" fill="#566578" font-family="Arial, sans-serif" font-size="22" font-weight="700">path, tool orientation, speeds</text>

  <g transform="translate(862 196)">
    <rect x="0" y="0" width="226" height="298" rx="14" fill="#111827" />
    <rect x="18" y="24" width="190" height="250" rx="8" fill="#f8fafc" />
    <text x="38" y="66" fill="#1d4f8e" font-family="Consolas, monospace" font-size="22" font-weight="800">LIN P1</text>
    <text x="38" y="106" fill="#0f766e" font-family="Consolas, monospace" font-size="22" font-weight="800">ArcON</text>
    <text x="38" y="146" fill="#1d4f8e" font-family="Consolas, monospace" font-size="22" font-weight="800">LIN P2</text>
    <text x="38" y="186" fill="#1d4f8e" font-family="Consolas, monospace" font-size="22" font-weight="800">LIN P3</text>
    <text x="38" y="226" fill="#c2410c" font-family="Consolas, monospace" font-size="22" font-weight="800">ArcOFF</text>
  </g>
  <text x="975" y="536" text-anchor="middle" fill="#566578" font-family="Arial, sans-serif" font-size="22" font-weight="700">vendor-specific commands</text>

  <path d="M184 634 L1016 634" fill="none" stroke="#0f766e" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow-teal)" />
  <text x="600" y="675" text-anchor="middle" fill="#0f766e" font-family="Arial, sans-serif" font-size="24" font-weight="800">The same geometry becomes executable only after process settings, frames, and a robot-specific postprocessor are correct.</text>
</svg>
